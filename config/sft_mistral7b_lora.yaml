model_name: mistralai/Mistral-7B-Instruct-v0.3
output_dir: outputs/mistral7b_security_sft
num_train_epochs: 3
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
logging_steps: 10
save_strategy: "epoch"
bf16: true
max_seq_length: 2048
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
